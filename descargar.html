<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparando Descarga</title>
</head>
<body>

<div class="caja-descarga">
    
    
    <img id="imagen-producto" class="img-producto" src="" alt="Icono" style="display: none;"> <h1 id="titulo-producto">Cargando...</h1>
    <p>Tu archivo se está procesando de manera segura.</p>
    
    <div id="contenedor-enlace" style="margin: 40px auto; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <span class="contador-texto" id="texto-estado">Preparando la descarga...</span>
    </div>

    <div id="contenedor-requisitos" class="seccion-requisitos" style="display: none;"></div>
</div>

<script>
   const urlParams = new URLSearchParams(window.location.search);
    const identificador = urlParams.get('id');
    const imagenUrl = urlParams.get('img');

    // Mostrar icono y título
    if (imagenUrl) {
      const imgElement = document.getElementById('imagen-producto');
      if (imgElement) {
        imgElement.src = decodeURIComponent(imagenUrl);
        imgElement.style.display = 'block'; 
      }
    }

    if (identificador) {
        document.getElementById('titulo-producto').textContent = identificador;
        document.title = "Descargando: " + identificador; 
    }


    const APIS_REQUISITOS = [
        { clave: 'npoint_req_1', url: 'https://api.npoint.io/baa6be5ab9366df087a5' },
        { clave: 'npoint_req_2', url: 'https://api.npoint.io/2c32572fc263665953f2' },
        { clave: 'npoint_req_3', url: 'https://api.npoint.io/00a83ff636223d29349d' }
    ];

    if (identificador) {
      const promesasRequisitos = APIS_REQUISITOS.map(api => {
          const guardado = sessionStorage.getItem(api.clave);
    
          if (guardado) return Promise.resolve(JSON.parse(guardado));
          return fetch(api.url).then(res => res.ok ? res.json() : {}).catch(() => ({}));
      });

      Promise.all(promesasRequisitos)
      .then(resultados => {
        let requisitosHtml = null;

        for (const datos of resultados) {
          if (datos && datos[identificador]) {
            requisitosHtml = datos[identificador];
            break; 
          }
        }

        let contenedor = document.getElementById('contenedor-requisitos');
        if (requisitosHtml && contenedor) {
          contenedor.innerHTML = '<h3>Requisitos Mínimos:</h3>' + requisitosHtml;
          contenedor.style.display = 'block'; 
          
          if (requisitosHtml.length > 150) {
              contenedor.classList.add('requisitos-largos');
          }
        }
      })
      .catch(err => console.error("Error al cargar requisitos:", err));
    }

    let enlaceReal = null;
    let errorCarga = false;
    let segundosRestantes = 5;
    const contenedorEnlace = document.getElementById('contenedor-enlace');
    
  
    const URL_EXTERNA = 'https://api.npoint.io/75ddbc009854c5b30240';

    fetch(URL_EXTERNA)
      .then(res => res.ok ? res.json() : Promise.reject("Error de red"))
      .then(datos => {
        let enlaceObtenido = datos[identificador];
        if (enlaceObtenido) {
            enlaceReal = atob(enlaceObtenido);
        } else {
            errorCarga = true;
        }
      })
      .catch(err => {
        console.error("Error al obtener enlace:", err);
        errorCarga = true;
      });

    // Iniciar cuenta regresiva
    iniciarCuenta();

    function iniciarCuenta() {
        const cuentaRegresiva = setInterval(() => {
          segundosRestantes--;
          if (contenedorEnlace) { 
            if (segundosRestantes > 0) {
               contenedorEnlace.innerHTML = `<span class="contador-texto">Tu enlace estará listo en ${segundosRestantes} segundos...</span>`;
            } else {
              clearInterval(cuentaRegresiva);
              mostrarBoton(); 
            }
          }
        }, 1000);
    }

    function mostrarBoton() {
        if (!contenedorEnlace) return;
        if (enlaceReal) {
            contenedorEnlace.innerHTML = `<a href="${enlaceReal}" class="btn-obtener" rel="nofollow noopener noreferrer" target="_blank">⚡ Descargar desde MediaFire</a>`;
        } else if (errorCarga) {
            contenedorEnlace.innerHTML = '<span style="color:#ff3333; font-weight:bold;">Error: El enlace no se pudo cargar, no existe o no tienes internet.</span>';
        } else {
            contenedorEnlace.innerHTML = '<span style="color:#ff3333; font-weight:bold;">Generando enlace...</span>';
            setTimeout(mostrarBoton, 1000);
        }
    }
</script>
</body>
</html>
