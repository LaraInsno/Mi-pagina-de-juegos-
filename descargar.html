<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparando Descarga</title>
  <style>
    * {
      box-sizing: border-box; 
    }
    body { 
      background: #000000; 
      color: #ffffff; 
      font-family: sans-serif; 
      text-align: center; 
      padding: 50px 20px; 
    }
    .caja-descarga { 
      max-width: 500px; 
      width: 100%; 
      margin: 0 auto; 
      background: #0a0a0a; 
      border: 1px solid #330000; 
      padding: 30px; 
      border-radius: 12px; 
    }
    h1 { 
      font-size: 1.8rem; 
      margin-bottom: 10px; 
      color: #ff3333; 
      word-wrap: break-word; 
    }
    p { color: #aaaaaa; margin-bottom: 25px; }
    
 
    .btn-obtener { 
      display: inline-block; 
      background: #ff0000; 
      color: #fff; 
      padding: 12px 30px; 
      text-decoration: none; 
      font-weight: bold; 
      border-radius: 50px; 
      font-size: 1.2rem; 
      box-shadow: 0 0 10px rgba(255,0,0,0.5); 
      transition: background 0.2s, transform 0.1s;
    }
    .btn-obtener:hover { 
      background: #cc0000; 
      box-shadow: 0 0 15px #ff0000; 
    }
    .btn-obtener:active {
      transform: scale(0.98); 
    }
    
  
    .contador-texto { 
      font-size: 1.3rem; 
      color: #ffcc00; 
      font-weight: bold; 
      display: block;
      line-height: 1.4;
    }
	
     .img-producto {
      max-width: 160px; 
      width: 100%;
      height: auto;
      margin: 15px auto;
      border-radius: 8px;
      display: none; 
    }


    @media (max-width: 480px) {
      body {
        padding: 20px 10px; 
      }
      .caja-descarga {
        padding: 20px 15px; 
      }
      h1 {
        font-size: 1.4rem; 
      }
      p {
        font-size: 0.9rem;
        margin-bottom: 20px;
      }
      .img-producto {
        max-width: 140px; 
      }
      .btn-obtener {
        font-size: 1rem;
        padding: 14px 20px; 
        width: 100%; 
      }
      .contador-texto {
        font-size: 1.1rem;
      }
    }
  </style>
  </head>
<body>


 <div class="caja-descarga">
  <h1 id="titulo-producto">Preparando Descarga</h1>
  <p>Tu archivo se está procesando de manera segura.</p>
  
  <img id="imagen-producto" class="img-producto" src="" alt="Imagen del archivo">
  
  <div id="contenedor-enlace">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const identificador = urlParams.get('id');
    const imagenUrl = urlParams.get('img'); 
    
   
    if (identificador) {
      document.getElementById('titulo-producto').innerText = identificador;
    }

    
    if (imagenUrl) {
      const imgElement = document.getElementById('imagen-producto');
      imgElement.src = decodeURIComponent(imagenUrl);
      imgElement.style.display = 'block'; 
    }

   
    let enlaceReal = null;
    let contadorTerminado = false;
    let errorCarga = false;

    const URL_EXTERNA = 'https://api.npoint.io/1404dd329823356e5270';

    
    const contenedor = document.getElementById('contenedor-enlace');

    function actualizarContenedor() {
      if (contenedor) { 
        if (contadorTerminado) {
          if (enlaceReal) {
            contenedor.innerHTML = '<a href="' + enlaceReal + '" class="btn-obtener" rel="nofollow noopener noreferrer" target="_blank">IR A LA DESCARGA</a>';
          } else if (errorCarga) {
            contenedor.innerHTML = '<span style="color:#ff3333; font-weight:bold;">Error: El enlace no se pudo cargar o no existe.</span>';
          } else {
            contenedor.innerHTML = '<span class="contador-texto">Generando enlace seguro... por favor espera</span>';
          }
        }
      }
    }

    fetch(URL_EXTERNA)
      .then(res => {
        if (!res.ok) throw new Error("Error al conectar con el servidor de enlaces");
        return res.json();
      })
      .then(datos => {
        let enlaceObtenido = datos[identificador];
        
        if (enlaceObtenido) {
            enlaceReal = atob(enlaceObtenido);
            actualizarContenedor(); 
        } else {
            errorCarga = true;
            actualizarContenedor();
        }
      })
      .catch(err => {
        console.error("Error al obtener los enlaces:", err);
        errorCarga = true;
        actualizarContenedor();
      });

   let segundosRestantes = 5;

   const cuentaRegresiva = setInterval(() => {
    segundosRestantes--;

    if (contenedor) { 
      if (segundosRestantes > 0) {
         contenedor.innerHTML = '<span class="contador-texto">Tu enlace estará listo en ' + segundosRestantes + ' segundos...</span>';
       } else {
        clearInterval(cuentaRegresiva);
        contadorTerminado = true;
         actualizarContenedor(); 
      }
    }
  }, 1000);
  </script>
</body>
</html>
